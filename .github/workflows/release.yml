name: release
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      UV_CACHE_DIR: /tmp/.uv-cache

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - run: echo "${{ secrets.AINTERVIEWER_GITHUB_TOKEN }}" | gh auth login --with-token
      - run: gh auth setup-git
      - run: gh auth status

      - name: Sync dependencies
        run: uv sync --locked --dev

      # - name: Run pre-commit hooks
      #   run: uv run pre-commit run --all-files

      # - run: uv run ruff check app
      - run: uv run ruff format --check app

      # - run: uv run ty check app
      # - run: uv run pytest -q

      - name: Minimize uv cache
        run: uv cache prune --ci

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    name: Docker Build & Publish

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      # 1. NEW: Generate Docker tags and metadata automatically
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # Tag with the git tag 
            type=ref,event=tag
            # Tag 'latest' ONLY if it is NOT a pre-release (no 'rc' in tag)
            type=raw,value=latest,enable=${{ !contains(github.ref, 'rc') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # Use the tags/labels generated by the metadata step
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          secrets: |
            github_token=${{ secrets.AINTERVIEWER_GITHUB_TOKEN }}
