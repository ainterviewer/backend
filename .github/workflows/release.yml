name: release
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      UV_CACHE_DIR: /tmp/.uv-cache

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - run: echo "${{ secrets.AINTERVIEWER_GITHUB_TOKEN }}" | gh auth login --with-token
      - run: gh auth setup-git
      - run: gh auth status

      - name: Sync dependencies
        run: uv sync --locked --dev

      # - name: Run pre-commit hooks
      #   run: uv run pre-commit run --all-files

      # - run: uv run ruff check app
      - run: uv run ruff format --check app

      # - run: uv run ty check app
      # - run: uv run pytest -q

      - name: Minimize uv cache
        run: uv cache prune --ci

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    name: Docker Build & Publish

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      # 1. NEW: Generate Docker tags and metadata automatically
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # Tag with the git tag 
            type=ref,event=tag
            # Tag 'latest' ONLY if it is NOT a pre-release (no 'rc' in tag)
            type=raw,value=latest,enable=${{ !contains(github.ref, 'rc') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Use the tags/labels generated by the metadata step
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          secrets: |
            github_token=${{ secrets.AINTERVIEWER_GITHUB_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: [docker]
    name: Deploy to ${{ contains(github.ref, 'rc') && 'Staging' || 'Production' }}

    steps:
      - name: Set Deployment Context
        id: context
        run: |
          if [[ "${{ github.ref }}" == *"rc"* ]]; then
            echo "ENV_NAME=staging" >> $GITHUB_OUTPUT
            echo "JUST_COMMAND=docker-deploy-staging" >> $GITHUB_OUTPUT
          else
            echo "ENV_NAME=production" >> $GITHUB_OUTPUT
            echo "JUST_COMMAND=docker-deploy-prod" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to remote (appleboy SSH)
        uses: appleboy/ssh-action@v0.1.8
        env:
          APP_ENV_PROD: ${{ secrets.APP_ENV_PRODUCTION }}
          APP_ENV_STAGING: ${{ secrets.APP_ENV_STAGING }}
          PROXY_ENV_PROD: ${{ secrets.PROXY_ENV_PRODUCTION }}
          PROXY_ENV_STAGING: ${{ secrets.PROXY_ENV_STAGING }}
          CONFIG_PROD: ${{ secrets.CONFIG_PRODUCTION }}
          CONFIG_STAGING: ${{ secrets.CONFIG_STAGING }}

          TARGET_ENV: ${{ steps.context.outputs.ENV_NAME }}
          JUST_CMD: ${{ steps.context.outputs.JUST_COMMAND }}

          RELEASE_TAG: ${{ github.ref_name }}

        with:
          host: ${{ secrets.REMOTE_SSH_HOST }}
          username: ${{ secrets.REMOTE_SSH_USER }}
          key: ${{ secrets.REMOTE_SSH_PRIVATE_KEY }}
          port: 22
          envs: APP_ENV_PROD,APP_ENV_STAGING,PROXY_ENV_PROD,PROXY_ENV_STAGING,CONFIG_PROD,CONFIG_STAGING,TARGET_ENV,JUST_CMD,RELEASE_TAG
          script: |
            cd /home/ubuntu/deploy
            git pull origin main

            export PATH="$HOME/.local/bin:$PATH"

            # Write the tag to .env for Docker Compose staging
            # echo "IMAGE_TAG=$RELEASE_TAG" > .env
            echo "Deploying version: $RELEASE_TAG to $TARGET_ENV"

            if [ "$TARGET_ENV" = "staging" ]; then
              # NOTE: Ensure your docker-compose is looking for these exact filenames!
              # Usually docker-compose looks for 'app.env', not 'app.prod.env'
              echo "$APP_ENV_STAGING" > envs/staging/app.env
              echo "$PROXY_ENV_STAGING" > envs/staging/proxy.env
              echo "$CONFIG_STAGING" > envs/staging/config.toml
            else
              echo "$APP_ENV_PROD" > envs/production/app.env
              echo "$PROXY_ENV_PROD" > envs/production/proxy.env
              echo "$CONFIG_PROD" > envs/production/config.toml
            fi

            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Running: just $JUST_CMD"
            just docker-deploy-staging
            # FIXME:
            # just $JUST_CMD
